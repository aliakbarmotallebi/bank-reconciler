name: Build App

on:
  push:
    tags:
    - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
        - os: windows-latest
          output: app.exe

        - os: macos-latest
          output: app

        - os: ubuntu-latest
          output: app

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    # Linux dependencies for Fyne
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

    - name: Install Fyne CLI
      run: |
        go install fyne.io/fyne/v2/cmd/fyne@latest

    - name: Download Go modules
      run: |
        go mod tidy

    - name: Build app
      run: |
        go build -v -o ${{ matrix.output }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}
        path: ${{ matrix.output }}
